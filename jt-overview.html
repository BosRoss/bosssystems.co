*{margin:0;padding:0;box-sizing:border-box}
body{background:#080808;color:#bbb;font-family:'SF Mono',Menlo,monospace;font-size:12px;min-height:100vh;display:flex;flex-direction:column}
nav{display:flex;align-items:center;gap:12px;padding:6px 16px;background:#060606;border-bottom:1px solid #1a1a1a;font-size:11px;overflow-x:auto;white-space:nowrap;flex-shrink:0}
nav a{color:#888;text-decoration:none}

.main{display:flex;flex:1;overflow:hidden}
@media(max-width:700px){.main{flex-direction:column}}

.sidebar{width:260px;min-width:260px;border-right:1px solid #1a1a1a;overflow-y:auto;background:#0a0a0a;flex-shrink:0}
@media(max-width:700px){.sidebar{width:100%;min-width:100%;max-height:40vh;border-right:none;border-bottom:1px solid #1a1a1a}}

.content{flex:1;overflow-y:auto;padding:20px}

.cat{border-bottom:1px solid #111}
.cat-head{padding:10px 14px;color:#C9A84C;font-size:11px;font-weight:600;letter-spacing:.5px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.cat-head:hover{background:#111}
.cat-head .arrow{transition:transform .2s;font-size:10px;color:#999}
.cat.open .arrow{transform:rotate(90deg)}
.cat-items{display:none;padding-bottom:4px}
.cat.open .cat-items{display:block}
.item{padding:6px 14px 6px 24px;color:#999;font-size:11px;cursor:pointer;border-left:2px solid transparent}
.item:hover{background:#111;color:#ddd}
.item.active{color:#C9A84C;border-left-color:#C9A84C;background:#0d0d0a}

.detail{max-width:800px}
.detail h2{color:#C9A84C;font-size:15px;font-weight:600;margin-bottom:4px}
.detail .subtitle{color:#888;font-size:11px;margin-bottom:16px}

.split{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:900px){.split{grid-template-columns:1fr}}
.col{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:6px;padding:14px}
.col-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-weight:600}
.col-label.you{color:#C9A84C}
.col-label.them{color:#4B92DB}

.entry{padding:6px 0;border-bottom:1px solid #111}
.entry:last-child{border-bottom:none}
.entry-title{color:#ddd;font-weight:600;font-size:11px;margin-bottom:2px}
.entry-text{color:#999;font-size:10px;line-height:1.6}

.badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:600;letter-spacing:.5px}
.badge.live{background:#0a2a0a;color:#00cc66;border:1px solid #0a3a0a}
.badge.off{background:#2a0a0a;color:#ff4444;border:1px solid #3a0a0a}
.badge.local{background:#1a1a0a;color:#C9A84C;border:1px solid #2a2a0a}
.badge.planned{background:#0a1a2a;color:#4B92DB;border:1px solid #0a2a3a}

.flow{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin:10px 0;padding:10px;background:#0a0a0a;border:1px solid #1a1a1a;border-radius:6px}
.step{background:#111;border:1px solid #222;border-radius:4px;padding:4px 10px;font-size:10px;color:#aaa}
.arr{color:#999;font-size:12px}

.note{background:#111;border-left:3px solid #C9A84C;padding:8px 12px;margin:12px 0;font-size:11px;color:#999;line-height:1.5}
.note.warn{border-left-color:#ff4444}
.note.info{border-left-color:#4B92DB}

.phone{color:#C9A84C;font-weight:600}
.welcome{text-align:center;padding:60px 20px;color:#999}
.welcome h2{color:#C9A84C;font-size:16px;margin-bottom:8px}

function buildSidebar() {
  var sb = document.getElementById('sidebar');
  var html = '';
  var first = true;
  for (var cat in MAP) {
    html += '<div class="cat' + (first ? ' open' : '') + '">';
    html += '<div class="cat-head" onclick="toggleCat(this)">' + cat + '<span class="arrow">&#9654;</span></div>';
    html += '<div class="cat-items">';
    for (var item in MAP[cat]) {
      html += '<div class="item" onclick="showItem(\'' + cat.replace(/'/g,"\\'") + '\',\'' + item.replace(/'/g,"\\'") + '\',this)">' + item + '</div>';
    }
    html += '</div></div>';
    first = false;
  }
  sb.innerHTML = html;
}

function toggleCat(el) {
  el.parentElement.classList.toggle('open');
}

function showItem(cat, item, el) {
  document.querySelectorAll('.item').forEach(function(i){i.classList.remove('active')});
  if(el) el.classList.add('active');
  var d = MAP[cat][item];
  var html = '<div class="detail">';
  html += '<h2>' + d.title + '</h2>';
  html += '<div class="subtitle">' + d.subtitle + '</div>';

  if (d.flow) {
    html += '<div class="flow">';
    for (var i = 0; i < d.flow.length; i++) {
      if (i > 0) html += '<span class="arr">&rarr;</span>';
      html += '<span class="step">' + d.flow[i] + '</span>';
    }
    html += '</div>';
  }

  var hasYou = d.you && d.you.length > 0;
  var hasThem = d.them && d.them.length > 0;

  if (hasYou || hasThem) {
    html += '<div class="split">';
    if (hasYou) {
      html += '<div class="col"><div class="col-label you">What you need to know</div>';
      for (var j = 0; j < d.you.length; j++) {
        html += '<div class="entry"><div class="entry-title">' + d.you[j].t + '</div><div class="entry-text">' + d.you[j].d + '</div></div>';
      }
      html += '</div>';
    }
    if (hasThem) {
      html += '<div class="col"><div class="col-label them">What the customer sees</div>';
      for (var k = 0; k < d.them.length; k++) {
        html += '<div class="entry"><div class="entry-title">' + d.them[k].t + '</div><div class="entry-text">' + d.them[k].d + '</div></div>';
      }
      html += '</div>';
    }
    html += '</div>';
  }

  html += '</div>';
  document.getElementById('content').innerHTML = html;
}
