<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>ATLAS Almanac — Intelligence Archive</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#C9A96E;--primary-light:#DFC48E;--primary-dark:#A8884A;
  --accent:#6B8DB5;
  --bg:#08090C;--surface:#0D0F14;--surface-2:#12151C;--surface-3:#1A1D26;
  --text:#C8CDD3;--text-muted:#6B7280;--text-dim:#363B44;
  --border:#1E2230;
  --success:#4ADE80;--warning:#D4A843;--danger:#C44040;
  --font-ui:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --font-data:'JetBrains Mono','Consolas','Monaco',monospace;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--font-ui);-webkit-font-smoothing:antialiased}
a{color:var(--primary);text-decoration:none}
a:hover{color:var(--primary-light)}

#topbar{position:fixed;top:0;left:0;right:0;height:44px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;z-index:1000;gap:10px}
#topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(201,169,110,0.3),transparent)}
.logo{font-size:15px;font-weight:800;letter-spacing:8px;color:var(--primary);font-family:var(--font-data);flex-shrink:0}
.logo span{color:var(--text-dim);font-weight:400;font-size:9px;letter-spacing:2px;margin-left:6px}
.topbar-right{display:flex;align-items:center;gap:12px;margin-left:auto}
.topbar-stat{font-size:10px;color:var(--text-muted);font-family:var(--font-data)}
.topbar-stat b{color:var(--text)}
.back-link{font-size:11px;color:var(--text-muted);font-family:var(--font-data);letter-spacing:1px}

main{padding:60px 20px 40px;max-width:900px;margin:0 auto}

.page-title{font-size:9px;font-weight:700;letter-spacing:4px;color:var(--primary);font-family:var(--font-data);margin-bottom:4px}
.page-subtitle{font-size:11px;color:var(--text-dim);margin-bottom:24px;font-family:var(--font-data);letter-spacing:1px}

.filter-bar{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.filter-btn{font-size:9px;font-weight:700;letter-spacing:1px;padding:4px 10px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-family:var(--font-data);cursor:pointer;transition:all 0.15s}
.filter-btn:hover{color:var(--text-muted);border-color:var(--text-dim)}
.filter-btn.active{background:rgba(201,169,110,0.1);color:var(--primary);border-color:rgba(201,169,110,0.3)}

.search-box{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 12px;font-size:12px;font-family:var(--font-ui);margin-bottom:20px;outline:none;transition:border-color 0.2s}
.search-box:focus{border-color:var(--primary)}
.search-box::placeholder{color:var(--text-dim)}

.section-title{font-size:9px;font-weight:700;letter-spacing:3px;color:var(--primary);font-family:var(--font-data);margin:24px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}

.entry{background:var(--surface);border:1px solid var(--border);padding:12px 14px;margin-bottom:6px;transition:border-color 0.15s;cursor:pointer}
.entry:hover{border-color:rgba(201,169,110,0.3)}
.entry-type{font-size:8px;font-weight:700;letter-spacing:1px;font-family:var(--font-data);padding:2px 6px;display:inline-block;margin-bottom:4px}
.entry-type.assessment{background:rgba(75,146,219,0.12);color:var(--accent)}
.entry-type.opportunity{background:rgba(0,204,102,0.1);color:var(--success)}
.entry-type.headline{background:rgba(212,168,67,0.1);color:var(--warning)}
.entry-type.anomaly{background:rgba(196,64,64,0.1);color:var(--danger)}
.entry-title{font-size:13px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:4px}
.entry-meta{font-size:10px;color:var(--text-dim);font-family:var(--font-data);display:flex;gap:12px;flex-wrap:wrap}
.entry-detail{display:none;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:11px;color:var(--text-muted);line-height:1.6}
.entry.expanded .entry-detail{display:block}

.empty-state{text-align:center;padding:40px 20px;color:var(--text-dim);font-size:12px;font-family:var(--font-data);letter-spacing:1px;line-height:1.8}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border);margin-bottom:20px}
.stat-box{background:var(--surface);padding:12px 8px;text-align:center}
.stat-val{font-size:20px;font-weight:800;font-family:var(--font-data);color:var(--text);line-height:1}
.stat-label{font-size:8px;color:var(--text-dim);letter-spacing:2px;margin-top:4px;font-family:var(--font-data)}
</style>
</head>
<body>

<div id="topbar">
  <div class="logo">ALMANAC<span>ATLAS ARCHIVE</span></div>
  <div class="topbar-right">
    <span class="topbar-stat"><b id="stat-total">0</b> ENTRIES</span>
    <span class="topbar-stat"><b id="stat-days">0</b> DAYS</span>
    <a href="atlas.html" class="back-link">&larr; LIVE MAP</a>
    <a href="command.html" class="back-link">&larr; COMMAND</a>
  </div>
</div>

<main>
  <div class="page-title">ATLAS ALMANAC</div>
  <div class="page-subtitle">Historical intelligence archive &mdash; assessments, headlines, opportunities, anomalies</div>

  <div class="stats-row">
    <div class="stat-box"><div class="stat-val" id="count-assessments">0</div><div class="stat-label">ASSESSMENTS</div></div>
    <div class="stat-box"><div class="stat-val" id="count-headlines">0</div><div class="stat-label">HEADLINES</div></div>
    <div class="stat-box"><div class="stat-val" id="count-opportunities">0</div><div class="stat-label">OPPORTUNITIES</div></div>
    <div class="stat-box"><div class="stat-val" id="count-anomalies">0</div><div class="stat-label">ANOMALIES</div></div>
  </div>

  <input type="text" class="search-box" id="search" placeholder="Search intelligence archive...">

  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">ALL</button>
    <button class="filter-btn" data-filter="assessment">ASSESSMENTS</button>
    <button class="filter-btn" data-filter="headline">HEADLINES</button>
    <button class="filter-btn" data-filter="opportunity">OPPORTUNITIES</button>
    <button class="filter-btn" data-filter="anomaly">ANOMALIES</button>
  </div>

  <div id="entries"></div>
</main>

<script>
var KB_URL = 'https://raw.githubusercontent.com/BosRoss/bosssystems.co/main/atlas_knowledge_base.json';
var LOCAL_URL = '../atlas_data/knowledge_base.json';
var allEntries = [];

function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function relTime(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  var diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 0) return 'upcoming';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  if (diff < 172800) return 'yesterday';
  if (diff < 604800) return Math.floor(diff/86400) + 'd ago';
  if (diff < 2592000) return Math.floor(diff/604800) + 'w ago';
  return d.toLocaleDateString();
}

function daysBetween(d1, d2) {
  return Math.floor(Math.abs(d2 - d1) / 86400000);
}

async function loadData() {
  var resp;
  try { resp = await fetch(LOCAL_URL); if (!resp.ok) throw new Error(); }
  catch(e) { try { resp = await fetch(KB_URL); if (!resp.ok) throw new Error(); } catch(e2) {
    document.getElementById('entries').innerHTML = '<div class="empty-state">No archive data found.<br><br>The knowledge base builds automatically as ATLAS scans.<br>Run a scan to start: <code>python3 scripts/atlas.py --scan-and-deploy</code></div>';
    return;
  }}
  var data = await resp.json();
  parseEntries(data);
  renderStats();
  renderEntries();
}

function parseEntries(data) {
  allEntries = [];
  (data.assessments || []).forEach(function(a) {
    allEntries.push({ type: 'assessment', title: a.title || a.assessment || '', detail: a.analysis || a.description || '', date: a.date || a.added || '', category: a.category || '', sources: a.sources_used || [] });
  });
  (data.headlines || []).forEach(function(h) {
    allEntries.push({ type: 'headline', title: h.headline || h.title || '', detail: h.analysis || '', date: h.date || h.added || '', category: h.category || '', sources: h.sources_used || [] });
  });
  (data.opportunities || []).forEach(function(o) {
    allEntries.push({ type: 'opportunity', title: o.opportunity || o.title || '', detail: o.analysis || o.description || '', date: o.date || o.added || '', category: o.category || '', sources: o.sources || [] });
  });
  (data.anomalies || []).forEach(function(a) {
    allEntries.push({ type: 'anomaly', title: a.pattern || a.title || '', detail: a.description || '', date: a.date || a.added || '', score: a.score || 0, sources: a.sources || [] });
  });
  allEntries.sort(function(a, b) {
    var da = new Date(a.date || 0), db = new Date(b.date || 0);
    return db - da;
  });
}

function renderStats() {
  var counts = { assessment: 0, headline: 0, opportunity: 0, anomaly: 0 };
  allEntries.forEach(function(e) { counts[e.type] = (counts[e.type] || 0) + 1; });
  document.getElementById('stat-total').textContent = allEntries.length;
  document.getElementById('count-assessments').textContent = counts.assessment;
  document.getElementById('count-headlines').textContent = counts.headline;
  document.getElementById('count-opportunities').textContent = counts.opportunity;
  document.getElementById('count-anomalies').textContent = counts.anomaly;
  if (allEntries.length > 0) {
    var dates = allEntries.filter(function(e){return e.date}).map(function(e){return new Date(e.date)}).filter(function(d){return !isNaN(d)});
    if (dates.length > 1) {
      var earliest = new Date(Math.min.apply(null, dates));
      document.getElementById('stat-days').textContent = daysBetween(earliest, new Date());
    }
  }
}

function renderEntries() {
  var container = document.getElementById('entries');
  var filter = document.querySelector('.filter-btn.active').dataset.filter;
  var search = document.getElementById('search').value.toLowerCase().trim();

  var filtered = allEntries.filter(function(e) {
    if (filter !== 'all' && e.type !== filter) return false;
    if (search && (e.title + ' ' + e.detail + ' ' + e.category).toLowerCase().indexOf(search) === -1) return false;
    return true;
  });

  if (!filtered.length) {
    container.innerHTML = '<div class="empty-state">No entries match your filter.</div>';
    return;
  }

  var currentDate = '';
  var html = '';
  filtered.forEach(function(e) {
    var d = new Date(e.date);
    var dateKey = isNaN(d) ? 'Unknown Date' : d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    if (dateKey !== currentDate) {
      currentDate = dateKey;
      html += '<div class="section-title">' + esc(dateKey) + '</div>';
    }
    html += '<div class="entry" onclick="this.classList.toggle(\'expanded\')">';
    html += '<span class="entry-type ' + e.type + '">' + e.type.toUpperCase() + '</span>';
    if (e.score) html += '<span style="font-size:10px;font-weight:700;color:var(--danger);font-family:var(--font-data);margin-left:6px">SCORE ' + e.score + '</span>';
    html += '<div class="entry-title">' + esc(e.title) + '</div>';
    html += '<div class="entry-meta">';
    if (e.date) html += '<span>' + esc(relTime(e.date)) + '</span>';
    if (e.category) html += '<span>' + esc(e.category) + '</span>';
    if (e.sources && e.sources.length) html += '<span>' + e.sources.length + ' sources</span>';
    html += '</div>';
    if (e.detail) html += '<div class="entry-detail">' + esc(e.detail) + '</div>';
    html += '</div>';
  });
  container.innerHTML = html;
}

document.querySelectorAll('.filter-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    renderEntries();
  });
});

document.getElementById('search').addEventListener('input', renderEntries);

loadData();
</script>
</body>
</html>
