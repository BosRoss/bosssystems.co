<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE BOSS — Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050608;
  --bg2: #0c0d12;
  --bg3: #12141a;
  --gold: #C9A84C;
  --gold-dim: #7a6530;
  --text: #e8e8f0;
  --dim: #4a4a6a;
  --green: #00e87a;
  --red: #ff3b3b;
  --border: #1a1c28;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Rajdhani',sans-serif; min-height:100vh; overflow-x:hidden; }
body::before { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px); pointer-events:none; z-index:999; }

/* ── LAUNCH SCREEN ── */
#launch {
  position:fixed; inset:0; background:#000; z-index:9999;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  cursor:pointer; transition:opacity 0.7s ease;
}
#launch.out { opacity:0; pointer-events:none; }
@keyframes rpulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.04);opacity:0.65} }
.l-cta  { font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:4px; color:rgba(201,168,76,0.4); animation:blink 1.6s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

/* ── HEADER ── */
header { background:linear-gradient(180deg,#09090f 0%,var(--bg) 100%); border-bottom:1px solid var(--gold-dim); padding:0 20px; position:sticky; top:0; z-index:100; }
.h-inner { max-width:1400px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; height:58px; gap:12px; }
.logo { display:flex; align-items:center; gap:12px; }
.logo-badge { width:36px; height:36px; border:1.5px solid var(--gold); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:15px; color:var(--gold); font-family:'Share Tech Mono',monospace; box-shadow:0 0 14px rgba(201,168,76,0.25); flex-shrink:0; }
.logo-title { font-size:18px; font-weight:700; color:var(--gold); letter-spacing:3px; line-height:1; }
.logo-sub   { font-size:9px; color:var(--dim); letter-spacing:2px; font-family:'Share Tech Mono',monospace; }
.h-right { display:flex; align-items:center; gap:14px; flex-shrink:0; }
.live-badge { display:flex; align-items:center; gap:6px; font-size:10px; color:var(--green); font-family:'Share Tech Mono',monospace; letter-spacing:1px; }
.live-dot { width:7px; height:7px; background:var(--green); border-radius:50%; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,232,122,0.4)} 50%{opacity:0.6;box-shadow:0 0 0 4px rgba(0,232,122,0)} }
#clock { font-family:'Share Tech Mono',monospace; font-size:12px; color:var(--dim); }

/* Stop button — subtle speaker in header */
#stop-btn {
  background:none; border:none; cursor:pointer; padding:6px;
  opacity:0.2; transition:opacity 0.2s, color 0.2s; font-size:16px; color:var(--text);
  line-height:1;
}
#stop-btn:hover { opacity:0.8; color:var(--red); }

.refresh-btn { background:none; border:1px solid var(--border); color:var(--dim); padding:4px 10px; border-radius:3px; cursor:pointer; font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:1px; transition:all 0.2s; }
.refresh-btn:hover { border-color:var(--gold); color:var(--gold); }

/* ── STATS BAR ── */
.stats-bar { background:var(--bg2); border-bottom:1px solid var(--border); padding:0 20px; }
.stats-inner { max-width:1400px; margin:0 auto; display:grid; grid-template-columns:repeat(5,1fr); }
.stat { padding:13px 16px; border-right:1px solid var(--border); text-align:center; }
.stat:last-child { border-right:none; }
.stat-value { font-size:26px; font-weight:700; font-family:'Share Tech Mono',monospace; line-height:1; margin-bottom:2px; }
.stat-label { font-size:9px; color:var(--dim); letter-spacing:2px; text-transform:uppercase; }
.stat.hot   .stat-value { color:#FF6B35; }
.stat.warm  .stat-value { color:var(--gold); }
.stat.cli   .stat-value { color:var(--green); }
.stat.act   .stat-value { color:#4A9EE8; }
.stat.tot   .stat-value { color:var(--text); }

/* ── MAIN ── */
main { max-width:1400px; margin:0 auto; padding:18px 20px; display:flex; flex-direction:column; gap:18px; }

/* ── ERROR STRIP ── */
#error-strip { background:rgba(255,59,59,0.07); border:1px solid rgba(255,59,59,0.25); border-radius:6px; padding:12px 16px; display:none; }
.err-title { font-size:10px; letter-spacing:2px; color:var(--red); margin-bottom:8px; font-family:'Share Tech Mono',monospace; }
.err-list { display:flex; flex-wrap:wrap; gap:8px; }
.err-item { font-size:11px; color:rgba(255,80,80,0.85); font-family:'Share Tech Mono',monospace; background:rgba(255,59,59,0.05); border:1px solid rgba(255,59,59,0.15); border-radius:3px; padding:3px 9px; cursor:pointer; transition:border-color 0.2s; }
.err-item:hover { border-color:rgba(255,59,59,0.5); }

/* ── DIVISION GRID ── */
.division-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
.div-card { background:var(--bg2); border:1px solid var(--border); border-radius:8px; overflow:hidden; transition:border-color 0.25s; }
.div-card:hover { border-color:var(--dc); }
.div-header { padding:13px 15px 11px; border-bottom:1px solid var(--border); background:linear-gradient(135deg,var(--bg3) 0%,var(--bg2) 100%); display:flex; align-items:center; gap:10px; }
.div-accent { width:3px; height:34px; border-radius:2px; background:var(--dc); box-shadow:0 0 8px var(--dc); flex-shrink:0; }
.div-info { flex:1; min-width:0; }
.div-name    { font-size:13px; font-weight:700; letter-spacing:2px; color:var(--dc); line-height:1; margin-bottom:2px; }
.div-tagline { font-size:9px; color:var(--dim); letter-spacing:1px; }
.div-count   { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--dim); flex-shrink:0; }

/* ── AGENT ROWS ── */
.agent-list { padding:6px 0; }
.agent-row {
  display:flex; align-items:center; gap:10px; padding:7px 15px;
  cursor:pointer; transition:background 0.12s; border-left:2px solid transparent;
  transition:background 0.12s, border-color 0.12s;
}
.agent-row:hover { background:rgba(255,255,255,0.035); border-left-color:var(--dc); }
.agent-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; transition:box-shadow 0.2s; }
.agent-dot.on  { background:var(--green); box-shadow:0 0 6px rgba(0,232,122,0.5); }
.agent-dot.off { background:var(--dim); }
.agent-name { font-size:13px; font-weight:600; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.agent-badge { font-size:8px; font-family:'Share Tech Mono',monospace; letter-spacing:1px; padding:2px 6px; border-radius:2px; flex-shrink:0; }
.agent-badge.on  { background:rgba(0,232,122,0.08); color:var(--green); border:1px solid rgba(0,232,122,0.18); }
.agent-badge.off { background:rgba(74,74,106,0.12); color:var(--dim); border:1px solid rgba(74,74,106,0.2); }
.agent-err { font-size:8px; font-family:'Share Tech Mono',monospace; color:var(--red); opacity:0.7; }

/* ── AGENT DRAWER ── */
#drawer-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:400; opacity:0; pointer-events:none; transition:opacity 0.25s; }
#drawer-overlay.open { opacity:1; pointer-events:all; }

#drawer {
  position:fixed; top:0; right:0; bottom:0; width:380px; max-width:100vw;
  background:var(--bg2); border-left:1px solid var(--border);
  z-index:500; transform:translateX(100%); transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);
  display:flex; flex-direction:column; overflow:hidden;
}
#drawer.open { transform:translateX(0); }

.drawer-header { padding:18px 18px 14px; border-bottom:1px solid var(--border); flex-shrink:0; }
.drawer-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:4px; }
.drawer-name { font-size:20px; font-weight:700; letter-spacing:1px; line-height:1.1; }
.drawer-close { background:none; border:none; color:var(--dim); cursor:pointer; font-size:20px; padding:0 0 0 12px; line-height:1; transition:color 0.2s; }
.drawer-close:hover { color:var(--text); }
.drawer-meta { display:flex; align-items:center; gap:10px; margin-top:6px; }
.drawer-div  { font-size:10px; font-family:'Share Tech Mono',monospace; letter-spacing:1px; color:var(--dim); }
.drawer-status { font-size:9px; font-family:'Share Tech Mono',monospace; letter-spacing:1px; padding:2px 8px; border-radius:2px; }
.drawer-status.on  { background:rgba(0,232,122,0.1); color:var(--green); border:1px solid rgba(0,232,122,0.2); }
.drawer-status.off { background:rgba(74,74,106,0.12); color:var(--dim); border:1px solid rgba(74,74,106,0.2); }

.drawer-body { padding:18px; flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:18px; }

.drawer-section { }
.drawer-section-title { font-size:9px; font-family:'Share Tech Mono',monospace; letter-spacing:2px; color:var(--dim); margin-bottom:8px; text-transform:uppercase; }
.drawer-desc { font-size:14px; font-weight:400; line-height:1.55; color:rgba(232,232,240,0.85); }

.drawer-caps { display:flex; flex-direction:column; gap:5px; }
.drawer-cap { display:flex; align-items:flex-start; gap:8px; font-size:13px; color:rgba(232,232,240,0.75); }
.drawer-cap::before { content:'›'; color:var(--drawer-color); flex-shrink:0; }

.err-history { display:flex; flex-direction:column; gap:6px; }
.err-row { display:flex; align-items:center; gap:8px; padding:7px 10px; background:rgba(255,59,59,0.05); border:1px solid rgba(255,59,59,0.12); border-radius:4px; }
.err-icon { font-size:10px; }
.err-time { font-size:11px; font-family:'Share Tech Mono',monospace; color:rgba(255,80,80,0.8); }
.no-errors { font-size:12px; font-family:'Share Tech Mono',monospace; color:var(--green); opacity:0.7; }

.drawer-footer { padding:14px 18px; border-top:1px solid var(--border); flex-shrink:0; }
.fire-btn {
  width:100%; padding:11px; background:rgba(201,168,76,0.08); border:1px solid var(--gold-dim);
  color:var(--gold); font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:700;
  letter-spacing:3px; border-radius:4px; cursor:pointer; transition:all 0.2s;
}
.fire-btn:hover { background:rgba(201,168,76,0.16); border-color:var(--gold); box-shadow:0 0 12px rgba(201,168,76,0.15); }
.fire-btn:disabled { opacity:0.3; cursor:not-allowed; }
.fire-confirm { font-size:11px; font-family:'Share Tech Mono',monospace; color:var(--green); margin-top:8px; text-align:center; display:none; }

/* ── FOOTER ── */
footer { text-align:center; padding:18px; font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--dim); letter-spacing:2px; border-top:1px solid var(--border); margin-top:4px; }
#last-updated { color:var(--gold-dim); }

/* ── RESPONSIVE ── */
@media (max-width:900px) { .division-grid{grid-template-columns:repeat(2,1fr)} .stats-inner{grid-template-columns:repeat(3,1fr)} .stat:nth-child(3){border-right:none} .stat:nth-child(n+4){border-top:1px solid var(--border)} }
@media (max-width:580px) { .division-grid{grid-template-columns:1fr} .stats-inner{grid-template-columns:repeat(3,1fr)} main{padding:12px} #drawer{width:100vw} .logo-sub{display:none} #clock{display:none} }
</style>
</head>

// ── CLOCK ──
function tick() {
  const ct = new Intl.DateTimeFormat('en-US',{timeZone:'America/Chicago',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).format(new Date());
  document.getElementById('clock').textContent = ct + ' CT';

// ── MUSIC ──
let marchTimer = null;
function stopMusic() {
  const m = document.getElementById('march');
  m.pause(); m.currentTime = 0;
  if (marchTimer) { clearTimeout(marchTimer); marchTimer = null; }
}
function playMarch() {
  const m = document.getElementById('march');
  m.volume = 0.85;
  m.play().catch(()=>{});
  marchTimer = setTimeout(stopMusic, 30000);
}

// ── LAUNCH ──
function launch() {
  playMarch();
  const el = document.getElementById('launch');
  el.classList.add('out');
  setTimeout(() => el.remove(), 750);
  loadData();
  setInterval(loadData, 120000);
}

// ESC closes drawer, also stops music
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeDrawer(); }
  if (e.key === 's' || e.key === 'S') { stopMusic(); }
});

// ── DATA ──
async function loadData() {
  try {
    const res = await fetch(API);
    if (!res.ok) throw new Error(res.status);
    dashData = await res.json();
    render();
  } catch(e) { console.error('Load failed:', e); }
}

function timeAgo(isoStr) {
  if (!isoStr) return '';
  const diff = Math.floor((Date.now() - new Date(isoStr.replace(' ','T')+'Z')) / 1000);
  if (diff < 60) return diff + 's ago';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}

function render() {
  if (!dashData) return;
  const {pipeline, divisions, errors, activeCount, totalCount, updatedAt} = dashData;

  document.getElementById('s-hot').textContent  = pipeline.hot;
  document.getElementById('s-warm').textContent = pipeline.warm;
  document.getElementById('s-cli').textContent  = pipeline.client;
  document.getElementById('s-act').textContent  = activeCount;
  document.getElementById('s-tot').textContent  = pipeline.total;

  // Errors
  const strip = document.getElementById('error-strip');
  const errList = document.getElementById('err-list');
  if (errors && errors.length) {
    strip.style.display = 'block';
    errList.innerHTML = errors.map(e =>
      `<div class="err-item" onclick='openAgentById("${e.wfId}")'>${e.workflow.replace(/^(THE POSSE|THE WIRE|THE IRON|THE BRAND|THE FRONTIER|FIELD OPS)\s*[—\-]+\s*/i,'')} — ${e.at}</div>`
    ).join('');
  } else { strip.style.display = 'none'; }

  // Grid
  document.getElementById('grid').innerHTML = Object.entries(divisions).map(([name, div]) => {
    const on = div.agents.filter(a => a.active).length;
    const rows = div.agents.map(a => {
      const hasErr = a.errors && a.errors.length;
      return `<div class="agent-row" style="--dc:${div.color}" onclick='openAgent(${JSON.stringify(a)}, ${JSON.stringify(div.color)}, ${JSON.stringify(name)})'>
        <div class="agent-dot ${a.active?'on':'off'}"></div>
        <div class="agent-name">${a.name}</div>
        ${hasErr ? `<div class="agent-err">⚠ ERR</div>` : ''}
        <div class="agent-badge ${a.active?'on':'off'}">${a.active?'ACTIVE':'OFF'}</div>
      </div>`;
    }).join('');
    return `<div class="div-card" style="--dc:${div.color}">
      <div class="div-header">
        <div class="div-accent"></div>
        <div class="div-info">
          <div class="div-name">${div.icon} ${name}</div>
          <div class="div-tagline">${div.tagline}</div>
        </div>
        <div class="div-count">${on}/${div.agents.length}</div>
      </div>
      <div class="agent-list">${rows}</div>
    </div>`;
  }).join('');

  const updated = new Date(updatedAt).toLocaleTimeString('en-US',{timeZone:'America/Chicago',hour:'2-digit',minute:'2-digit',hour12:true});
  document.getElementById('last-updated').textContent = updated + ' CT';
}

// ── DRAWER ──
function openAgent(agent, color, divName) {
  currentAgent = agent;
  // Look up by name first (works for any new workflow), fall back to ID-based AGENTS lookup
  const nameDesc = AGENT_DESCS[agent.name];
  const idInfo = AGENTS[agent.id] || {};
  const info = {
    desc: nameDesc || idInfo.desc || `${agent.name} — part of the BOSS Systems automation stack.`,
    caps: idInfo.caps || [],
    trigger: idInfo.trigger || null
  };

  document.getElementById('d-name').textContent = agent.name;
  document.getElementById('d-div').textContent = divName;
  document.getElementById('d-status').textContent = agent.active ? 'ACTIVE' : 'OFFLINE';
  document.getElementById('d-status').className = 'drawer-status ' + (agent.active ? 'on' : 'off');
  document.getElementById('d-desc').textContent = info.desc;
  document.getElementById('drawer').style.setProperty('--drawer-color', color);

  // Capabilities
  document.getElementById('d-caps').innerHTML = (info.caps || []).map(c =>
    `<div class="drawer-cap">${c}</div>`
  ).join('');

  // Errors
  const errEl = document.getElementById('d-errors');
  if (agent.errors && agent.errors.length) {
    errEl.innerHTML = agent.errors.map(e =>
      `<div class="err-row"><div class="err-icon">⚠</div><div class="err-time">${e.status.toUpperCase()} — ${e.at}</div></div>`
    ).join('');
  } else {
    errEl.innerHTML = '<div class="no-errors">✓ No recent errors</div>';
  }

  // Fire button
  const btn = document.getElementById('d-fire-btn');
  const confirm = document.getElementById('d-fire-confirm');
  confirm.style.display = 'none';
  if (info.trigger) {
    btn.disabled = false;
    btn.textContent = '▶ FIRE NOW';
  } else {
    btn.disabled = true;
    btn.textContent = 'RUNS ON SCHEDULE';
  }

  document.getElementById('drawer-overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}

function openAgentById(wfId) {
  if (!dashData) return;
  for (const [divName, div] of Object.entries(dashData.divisions)) {
    const agent = div.agents.find(a => a.id === wfId);
    if (agent) { openAgent(agent, div.color, divName); return; }
  }
}

function closeDrawer() {
  document.getElementById('drawer-overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
  currentAgent = null;
}

async function fireAgent() {
  if (!currentAgent) return;
  const info = AGENTS[currentAgent.id];
  if (!info || !info.trigger) return;

  const btn = document.getElementById('d-fire-btn');
  btn.textContent = 'FIRING...';
  btn.disabled = true;

  try {
    await fetch(`https://jamross.app.n8n.cloud/webhook/${info.trigger}`, {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: '{}'
    });
    document.getElementById('d-fire-confirm').style.display = 'block';
    btn.textContent = '▶ FIRE NOW';
    btn.disabled = false;
  } catch(e) {
    btn.textContent = 'ERROR — TRY AGAIN';
    btn.disabled = false;
  }
}
